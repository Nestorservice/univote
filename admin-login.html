<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>UNI-VOTE - Connexion Admin</title>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/icofont/icofont.min.css" rel="stylesheet">
    <link href="vendor/icons/css/materialdesignicons.min.css" rel="stylesheet" type="text/css">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/univote.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="bg-white rounded-4 shadow-sm p-4 text-center">
                    <img src="img/logo.png" alt="UNI-VOTE" class="img-fluid mb-4" style="max-height: 50px;">
                    <h5 class="fw-bold mb-3">Administration</h5>
                    <p class="text-muted small mb-4">Connectez-vous pour gérer la plateforme</p>
                    
                    <form id="adminLoginForm">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control rounded-pill" id="adminEmail" placeholder="name@example.com" required>
                            <label for="adminEmail">Adresse Email</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control rounded-pill" id="adminPassword" placeholder="Mot de passe" required>
                            <label for="adminPassword">Mot de passe</label>
                        </div>
                        
                        <div id="loginError" class="alert alert-danger d-none small py-2 rounded-4" role="alert"></div>
                        
                        <button type="submit" class="btn btn-primary rounded-pill w-100 py-3 fw-bold" id="loginBtn">
                            Connexion
                        </button>
                    </form>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted text-decoration-none small"><span class="material-icons md-16 align-middle me-1">arrow_back</span> Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var err = document.getElementById('loginError');
            var email = document.getElementById('adminEmail').value;
            var password = document.getElementById('adminPassword').value;

            err.classList.add('d-none');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connexion...';

            // Custom POST request to login (since auth is not explicitly defined in api.js)
            var url = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE ? CONFIG.API_BASE : 'http://localhost:8080/api/v1') + '/auth/login';
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    localStorage.setItem('admin_token', data.data.token);
                    localStorage.setItem('admin_user', JSON.stringify(data.data.user));
                    window.location.href = 'admin.html';
                } else {
                    throw new Error(data.error || 'Identifiants incorrects');
                }
            })
            .catch(function(error) {
                err.textContent = error.message;
                err.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Connexion';
            });
        });

        // Redirect to admin if already logged in
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
