    <div class="py-4">

                        </div>
                    </div>
                </main>
                <aside class="col col-xl-3 order-xl-1 col-lg-6 order-lg-2 col-md-6 col-sm-6 col-12">
                    <div class="p-2 bg-light offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample">
                        <div class="sidebar-nav mb-3">
                            <div class="pb-4">
                                <a href="events.html" class="text-decoration-none">

                                </a>
                            </div>
                            <ul class="navbar-nav justify-content-end flex-grow-1">
                                <li class="nav-item">
                                    <a href="events.html" class="nav-link active"><span class="material-icons me-3">how_to_vote</span> <span>Evenements</span></a>
                                </li>
                                <li class="nav-item">
                                    <a href="pseudo.html" class="nav-link"><span class="material-icons me-3">person</span> <span>Pseudo</span></a>

                            </ul>
                        </div>
                    </div>
                    <div class="ps-0 m-none fix-sidebar">
                        <div class="sidebar-nav mb-3">
                            <div class="pb-4 mb-4">
                                <a href="events.html" class="text-decoration-none">
                                    <img src="img/logo.png" class="img-fluid logo" alt="logo">
                                </a>
                            </div>
                            <ul class="navbar-nav justify-content-end flex-grow-1">
                                <li class="nav-item">
                                    <a href="events.html" class="nav-link active"><span class="material-icons me-3">how_to_vote</span> <span>Evenements</span></a>
                                </li>
                                <li class="nav-item">
                                    <a href="pseudo.html" class="nav-link"><span class="material-icons me-3">person</span> <span>Pseudo</span></a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </aside>
                <aside class="col col-xl-3 order-xl-3 col-lg-6 order-lg-3 col-md-6 col-sm-6 col-12">
                    <div class="fix-sidebar">
                        <div class="side-trend lg-none">
                            <div class="sticky-sidebar2 mb-3">
                                <div class="bg-white rounded-4 overflow-hidden shadow-sm mb-4">
                                    <h6 class="fw-bold text-body p-3 mb-0 border-bottom">Videos du candidat</h6>
                                    <div id="candidate-videos">
                                        <div class="p-3 text-center text-muted">Chargement...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/custom.js"></script>
    <script>
    (function () {
        "use strict";
        
        var candidateId = null;
        var currentCandidate = null;
        
        function getParams() {
            return new URLSearchParams(window.location.search).get('id');
        }
        
        function loadCandidate() {
            candidateId = getParams();
            if (!candidateId) {
                window.location.href = 'events.html';
                return;
            }
            
            document.getElementById('candidate-content').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
            
            API.getCandidate(candidateId).then(function (data) {
                currentCandidate = data;
                document.getElementById('candidate-name').textContent = '#' + data.dossard + ' ' + data.name;
                renderCandidate(data);
                loadVideos(data.event_id);
            }).catch(function (error) {
                document.getElementById('candidate-content').innerHTML = '<div class="text-center py-4 text-danger">Erreur: ' + error.message + '</div>';
            });
        }
        
        function renderCandidate(candidate) {
            var html = Components.renderCandidateDetail(candidate);
            document.getElementById('candidate-content').innerHTML = html;
        }
        
        function loadVideos(eventId) {
            var container = document.getElementById('candidate-videos');
            
            API.getVideos(eventId, 'popular', null, 10).then(function (data) {
                var videos = data.videos.filter(function (v) {
                    return v.candidate_id === parseInt(candidateId);
                });
                
                if (videos.length === 0) {
                    container.innerHTML = '<div class="p-3 text-center text-muted">Aucune video</div>';
                    return;
                }
                
                var html = '<div class="video-grid p-2">';
                for (var i = 0; i < videos.length; i++) {
                    var v = videos[i];
                    html += '<a href="video-player.html?id=' + v.id + '&event=' + eventId + '" class="video-grid-item">';
                    html += '<img src="' + (v.thumbnail_url || 'img/post1.png') + '">';
                    html += '</a>';
                }
                html += '</div>';
                container.innerHTML = html;
            }).catch(function () {
                container.innerHTML = '<div class="p-3 text-center text-muted">Impossible de charger</div>';
            });
        }
        
        document.addEventListener('DOMContentLoaded', loadCandidate);
        
    })();
    </script>
</body>
</html>
