# docker-compose.prod.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ─── PostgreSQL (Production) ────────────────────────────────────
  postgres:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (Production) ────────────────────────────────────────
  redis:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend (Production) ──────────────────────────────────────
  backend:
    restart: always
    environment:
      GIN_MODE: release
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend (Production) ─────────────────────────────────────
  frontend:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx (Production with SSL) ──────────────────────────────
  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/uploads:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Certbot (SSL Certificate Manager) ────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: univote_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renouvellement automatique toutes les 12 heures
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - univote_network

volumes:
  certbot_conf:
    driver: local
  certbot_www:
    driver: local
