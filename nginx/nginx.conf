# ╔══════════════════════════════════════════════════════════════╗
# ║              UNI-VOTE — Nginx Reverse Proxy                 ║
# ╚══════════════════════════════════════════════════════════════╝

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Général ─────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ─── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ─────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ─── Taille upload (photos candidats) ────────────────────────
    client_max_body_size 20M;

    # ─── Gzip Compression ───────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_min_length  1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ─── Rate Limiting Zones ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_vote:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

    # ─── Upstream Servers ────────────────────────────────────────
    upstream backend_api {
        server backend:8080;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ─── Serveur HTTP (port 80) ──────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ─── Certbot challenge (production SSL) ─────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ─── Headers de sécurité ────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── API Backend (/api) ─────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─── Rate limiting spécifique vote ──────────────────────
        location /api/v1/vote/ {
            limit_req zone=api_vote burst=5 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Rate limiting spécifique auth ──────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=3 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Webhooks (pas de rate limit, IP Notch Pay) ─────────
        location /api/v1/webhooks/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── WebSocket (/ws) ────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Fichiers uploadés (photos candidats) ───────────────
        location /uploads/ {
            alias /uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # Limiter les types de fichiers servis
            location ~* \.(jpg|jpeg|png|gif|webp|mp4|webm)$ {
                try_files $uri =404;
            }
        }

        # ─── Frontend Next.js (fallback) ────────────────────────
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── Assets statiques Next.js ───────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Serveur HTTPS (port 443) — activé en production ────────
    # Décommenter et configurer après obtention du certificat SSL
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name vote.universite.cm;
    #
    #     ssl_certificate     /etc/letsencrypt/live/vote.universite.cm/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/vote.universite.cm/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Mêmes locations que ci-dessus...
    # }
}
