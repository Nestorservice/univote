    <script>
    (function () {
        "use strict";
        
        var eventId = null;
        var currentEvent = null;
        
        function getEventId() {
            var params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        function loadEvent() {
            eventId = getEventId();
            if (!eventId) {
                window.location.href = 'events.html';
                return;
            }
            
            var content = document.getElementById('event-content');
            content.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
            
            API.getEvent(eventId).then(function (data) {
                currentEvent = data;
                document.getElementById('event-title').textContent = data.title;
                renderEvent(data);
                if (data.show_results) {
                    connectWebSocket();
                }
            }).catch(function (error) {
                content.innerHTML = '<div class="text-center py-4 text-danger">Erreur: ' + error.message + '</div>';
                Utils.showError('Erreur chargement: ' + error.message);
            });
        }
        
        function renderEvent(event) {
            var content = document.getElementById('event-content');
            var statusClass = 'bg-secondary';
            var statusText = 'Inconnu';
            if (event.status === 'open') { statusClass = 'bg-success'; statusText = 'Ouvert'; }
            else if (event.status === 'upcoming') { statusClass = 'bg-warning text-dark'; statusText = 'A venir'; }
            else if (event.status === 'closed') { statusClass = 'bg-secondary'; statusText = 'Termine'; }
            
            var html = '<div class="bg-white rounded-4 shadow-sm p-4 mb-4">';
            
            if (event.banner_url) {
                html += '<img src="' + event.banner_url + '" class="img-fluid rounded mb-4 w-100" style="max-height:200px;object-fit:cover;" alt="banner">';
            }
            
            html += '<span class="badge ' + statusClass + ' mb-3">' + statusText + '</span>';
            html += '<h4 class="mb-2">' + sanitizeHTML(event.title) + '</h4>';
            html += '<p class="text-muted mb-3">' + sanitizeHTML(event.description || '') + '</p>';
            
            if (event.status === 'open') {
                html += Components.renderCountdown(event.closes_at);
            }
            
            html += '<div class="d-flex align-items-center justify-content-between mb-4">';
            html += '<span class="text-muted"><span class="material-icons md-16 me-1">how_to_vote</span>' + (event.type === 'free' ? 'Gratuit' : event.price_per_vote + ' FCA/vote') + '</span>';
            html += '<span class="text-muted"><span class="material-icons md-16 me-1">people</span>' + (event.candidates ? event.candidates.length : '?') + ' candidats</span>';
            html += '</div>';
            
            html += '</div>';
            
            html += '<h5 class="mb-3 fw-bold">Candidats</h5>';
            html += Components.renderCandidatesList(event.candidates || []);
            
            content.innerHTML = html;
            loadVideos();
        }
        
        function loadVideos() {
            var videosDiv = document.getElementById('sidebar-videos');
            if (!currentEvent || !currentEvent.id) return;
            
            API.getVideos(currentEvent.id, 'recent', null, 6).then(function (data) {
                var html = '<h6 class="fw-bold text-body p-3 mb-0 border-bottom">Videos</h6>';
                if (data.videos && data.videos.length > 0) {
                    html += '<div class="video-grid p-2">';
                    for (var i = 0; i < data.videos.length; i++) {
                        var v = data.videos[i];
                        html += '<a href="video-player.html?id=' + v.id + '&event=' + currentEvent.id + '" class="video-grid-item">';
                        html += '<img src="' + (v.thumbnail_url || 'img/post1.png') + '">';
                        html += '</a>';
                    }
                    html += '</div>';
                    html += '<a href="video-feed.html?event=' + currentEvent.id + '" class="d-block p-3 text-center border-top text-decoration-none">Voir toutes les videos</a>';
                } else {
                    html += '<div class="p-3 text-center text-muted">Aucune video</div>';
                }
                videosDiv.innerHTML = html;
            }).catch(function () {
                videosDiv.innerHTML = '<div class="p-3 text-center text-muted">Impossible de charger les videos</div>';
            });
        }
        
        function connectWebSocket() {
            if (!eventId) return;
            
            WebSocketClient.connect(eventId);
            WebSocketClient.onMessage = function (data) {
                updateResults(data);
            };
        }
        
        function updateResults(data) {
            var resultsDiv = document.getElementById('results-bar');
            if (!resultsDiv || !currentEvent) return;
            
            var totalVotes = currentEvent.candidates.reduce(function (sum, c) {
                return sum + (c.id === data.candidate_id ? data.vote_count : c.vote_count);
            }, 0);
            
            var html = '';
            for (var i = 0; i < currentEvent.candidates.length; i++) {
                var c = currentEvent.candidates[i];
                if (c.id === data.candidate_id) {
                    c.vote_count = data.vote_count;
                }
                html += Components.renderResultsBar(c, totalVotes);
            }
            resultsDiv.innerHTML = html;
            currentEvent.candidates.sort(function (a, b) { return b.vote_count - a.vote_count; });
        }
        
        document.addEventListener('DOMContentLoaded', loadEvent);
        
    })();
    </script>
