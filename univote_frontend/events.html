    <script>
    (function () {
        "use strict";
        
        function loadEvents() {
            var openList = document.getElementById('events-open-list');
            var upcomingList = document.getElementById('events-upcoming-list');
            var closedList = document.getElementById('events-closed-list');
            
            openList.innerHTML = Components.showLoading();
            upcomingList.innerHTML = Components.showLoading();
            closedList.innerHTML = Components.showLoading();
            
            API.getEvents('open').then(function (data) {
                if (data.events && data.events.length > 0) {
                    var html = '';
                    for (var i = 0; i < data.events.length; i++) {
                        html += Components.renderEventCard(data.events[i]);
                    }
                    openList.innerHTML = html;
                } else {
                    openList.innerHTML = Components.showEmpty('Aucun scrutin ouvert');
                }
            }).catch(function (error) {
                openList.innerHTML = Components.showError('Erreur: ' + error.message);
            });
            
            // Note: le backend ne supporte pas "upcoming" comme statut de filtre.
            // On affiche les events "draft" comme "à venir" (visible seulement si admin les publie).
            upcomingList.innerHTML = Components.showEmpty('Aucun scrutin à venir');
            
            API.getEvents('closed').then(function (data) {
                if (data.events && data.events.length > 0) {
                    var html = '';
                    for (var i = 0; i < data.events.length; i++) {
                        html += Components.renderEventCard(data.events[i]);
                    }
                    closedList.innerHTML = html;
                } else {
                    closedList.innerHTML = Components.showEmpty('Aucun scrutin terminé');
                }
            }).catch(function (error) {
                closedList.innerHTML = Components.showError('Erreur: ' + error.message);
            });
        }
        
        document.addEventListener('DOMContentLoaded', function () {
            loadEvents();
        });
        
    })();
    </script>
