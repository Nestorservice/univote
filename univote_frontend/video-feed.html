    <script src="vendor/jquery/jquery.min.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/custom.js"></script>
    <script>
    (function () {
        "use strict";
        
        var eventId = null;
        
        function getEventId() {
            return new URLSearchParams(window.location.search).get('event');
        }
        
        function loadVideos() {
            eventId = getEventId();
            if (!eventId) {
                window.location.href = 'events.html';
                return;
            }
            
            document.getElementById('videos-recent').innerHTML = Components.showLoading();
            document.getElementById('videos-popular').innerHTML = Components.showLoading();
            
            API.getVideos(eventId, 'recent', null, 20).then(function (data) {
                document.getElementById('videos-recent').innerHTML = Components.renderVideosList(data.videos, eventId);
                setupLikeButtons(data.videos);
            }).catch(function (error) {
                document.getElementById('videos-recent').innerHTML = '<div class="text-center py-4 text-danger">Erreur: ' + error.message + '</div>';
            });
            
            API.getVideos(eventId, 'popular', null, 20).then(function (data) {
                document.getElementById('videos-popular').innerHTML = Components.renderVideosList(data.videos, eventId);
            }).catch(function (error) {
                document.getElementById('videos-popular').innerHTML = '<div class="text-center py-4 text-danger">Erreur: ' + error.message + '</div>';
            });
        }
        
        function setupLikeButtons(videos) {
            var likeBtns = document.querySelectorAll('.like-btn');
            for (var i = 0; i < likeBtns.length; i++) {
                likeBtns[i].addEventListener('click', handleLike);
            }
            
            var commentBtns = document.querySelectorAll('.comment-btn');
            for (var j = 0; j < commentBtns.length; j++) {
                commentBtns[j].addEventListener('click', handleComment);
            }
        }
        
        function handleLike(e) {
            var videoId = this.dataset.video;
            var pseudo = Utils.getPseudo();
            if (!pseudo) {
                Utils.showPseudoModal(function () {
                    handleLike.call({ dataset: { video: videoId } });
                });
                return;
            }
            
            Utils.disableButton(this);
            API.likeVideo(videoId, pseudo).then(function () {
                Utils.showSuccess('Like ajoute!');
                Utils.enableButton(this || e.target);
            }).catch(function (error) {
                Utils.enableButton(this || e.target);
                Utils.showError(error.message);
            });
        }
        
        function handleComment(e) {
            var videoId = this.dataset.video;
            window.location.href = 'video-player.html?id=' + videoId + '&event=' + eventId;
        }
        
        document.addEventListener('DOMContentLoaded', loadVideos);
        
    })();
    </script>
