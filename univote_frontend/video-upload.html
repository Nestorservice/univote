<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>Uploader Video - UNI-VOTE</title>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/icofont/icofont.min.css" rel="stylesheet">
    <link href="vendor/icons/css/materialdesignicons.min.css" rel="stylesheet" type="text/css">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/univote.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="theme-switch-wrapper ms-3">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox">
            <span class="slider round"></span>
            <i class="icofont-ui-brightness"></i>
        </label>
        <em>Mode Sombre</em>
    </div>
    <div class="web-none d-flex align-items-center px-3 pt-3">
        <a href="events.html" class="text-decoration-none">
            <img src="img/logo.png" class="img-fluid logo-mobile" alt="logo">
        </a>
        <div class="dropdown ms-auto">
            <button class="btn btn-light bg-white bg-opacity-75 rounded-circle p-2 border-0 shadow-sm d-flex align-items-center justify-content-center" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="width: 40px; height: 40px;">
                <span class="material-icons text-dark">more_vert</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow rounded-4 mt-2">
                <li><a class="dropdown-item py-2 d-flex align-items-center" href="#"><span class="material-icons md-18 me-2 text-muted">info</span>À propos</a></li>
                <li><a class="dropdown-item py-2 d-flex align-items-center" href="faq.html"><span class="material-icons md-18 me-2 text-muted">help_outline</span>FAQ</a></li>
            </ul>
        </div>
    </div>
    <div class="py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col col-xl-6 col-lg-8 col-md-10 col-sm-12">
                    <div class="mb-4 d-flex align-items-center">
                        <a href="javascript:history.back()" class="material-icons text-dark text-decoration-none me-3">arrow_back</a>
                        <p class="ms-2 mb-0 fw-bold text-body fs-6">Uploader une Video</p>
                    </div>
                    <div class="bg-white p-4 feed-item rounded-4 shadow-sm mb-4">
                        <h5 class="mb-4 fw-bold">Nouvelle video</h5>
                        <div class="mb-3">
                            <label class="form-label">Evenement</label>
                            <select class="form-select rounded-5" id="eventSelect">
                                <option value="">Selectionner un evenement...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Type de contenu</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="contentType" id="typeVideo" value="video" checked>
                                    <label class="form-check-label" for="typeVideo">Vidéo</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="contentType" id="typeImage" value="image">
                                    <label class="form-check-label" for="typeImage">Image</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Titre</label>
                            <input type="text" class="form-control rounded-5" id="titleInput" placeholder="Titre de votre publication" maxlength="100">
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary rounded-5 py-3 fw-bold" id="getUrlBtn">Continuer</button>
                        </div>
                    </div>
                    <div id="upload-section" style="display:none;">
                        <div class="bg-white p-4 feed-item rounded-4 shadow-sm">
                            <h6 class="mb-3 fw-bold" id="upload-title">Uploader votre fichier</h6>
                            <p class="small text-muted mb-3" id="upload-hint">Formats acceptes: MP4, H.264. Duree max: 30 secondes.</p>
                            <div class="text-center p-5 border rounded-4 bg-light mb-3" id="dropzone">
                                <span class="material-icons md-32 text-muted d-block mb-2">cloud_upload</span>
                                <p class="mb-2">Glissez votre fichier ici</p>
                                <p class="small text-muted mb-3">ou</p>
                                <input type="file" id="fileInput" hidden>
                                <button class="btn btn-outline-primary rounded-pill" onclick="document.getElementById('fileInput').click()">Parcourir</button>
                            </div>
                            <div class="progress mb-3" style="display:none;" id="uploadProgress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
                            </div>
                            <p class="small text-muted">Apres upload, le contenu sera examine par moderation IA avant d'etre publie.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/custom.js"></script>
    <script>
    (function () {
        "use strict";
        
        var uploadData = null;
        var selectedType = 'video';
        
        function loadEvents() {
            var select = document.getElementById('eventSelect');
            API.getEvents('open').then(function (data) {
                var html = '<option value="">Selectionner un evenement...</option>';
                if (data.events) {
                    for (var i = 0; i < data.events.length; i++) {
                        html += '<option value="' + data.events[i].id + '">' + data.events[i].title + '</option>';
                    }
                }
                select.innerHTML = html;
            }).catch(function () {
                select.innerHTML = '<option value="">Erreur chargement</option>';
            });
        }
        
        function requestUploadUrl() {
            var pseudo = Utils.getPseudo();
            if (!pseudo) {
                Utils.showPseudoModal(requestUploadUrl);
                return;
            }
            
            var eventId = document.getElementById('eventSelect').value;
            var title = document.getElementById('titleInput').value.trim();
            selectedType = document.querySelector('input[name="contentType"]:checked').value;
            
            if (!eventId) {
                Utils.showError('Veuillez selectionner un evenement');
                return;
            }
            if (!title) {
                Utils.showError('Veuillez entrer un titre');
                return;
            }
            
            var btn = document.getElementById('getUrlBtn');
            Utils.disableButton(btn);
            
            API.requestUpload(eventId, null, pseudo, title, selectedType).then(function (data) {
                uploadData = data;
                document.getElementById('upload-section').style.display = 'block';
                document.getElementById('upload-title').textContent = selectedType === 'video' ? 'Uploader votre vidéo' : 'Uploader votre image';
                document.getElementById('upload-hint').textContent = selectedType === 'video' ? 'Formats acceptés: MP4, MOV. Max 30s.' : 'Formats acceptés: JPG, PNG, WEBP.';
                document.getElementById('fileInput').accept = selectedType === 'video' ? 'video/*' : 'image/*';
                Utils.showInfo('Prêt pour l\'upload');
                Utils.enableButton(btn);
            }).catch(function (error) {
                Utils.enableButton(btn);
                Utils.showError(error.message);
            });
        }
        
        function handleFileUpload() {
            var file = this.files[0];
            if (!file || !uploadData) return;
            
            var progress = document.getElementById('uploadProgress');
            var bar = progress.querySelector('.progress-bar');
            progress.style.display = 'block';
            
            var formData = new FormData();
            formData.append('file', file);
            formData.append('signature', uploadData.signature);
            formData.append('timestamp', uploadData.timestamp);
            formData.append('api_key', uploadData.api_key);
            formData.append('folder', uploadData.folder);
            formData.append('context', 'pending_video_id=' + uploadData.pending_video_id);
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', uploadData.upload_url, true);
            
            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = percent + '%';
                    bar.textContent = percent + '%';
                }
            };
            
            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    Utils.showSuccess('Upload réussi ! Publication après modération.');
                    setTimeout(function () {
                        window.location.href = 'video-feed.html?event=' + document.getElementById('eventSelect').value;
                    }, 2000);
                } else {
                    var err = 'Erreur serveur';
                    try { err = JSON.parse(xhr.responseText).error.message; } catch(e){}
                    Utils.showError('Erreur: ' + err);
                }
            };
            
            xhr.onerror = function() {
                Utils.showError('Erreur réseau lors de l\'upload');
            };
            
            xhr.send(formData);
        }
        
        document.getElementById('getUrlBtn').addEventListener('click', requestUploadUrl);
        document.getElementById('fileInput').addEventListener('change', handleFileUpload);
        document.addEventListener('DOMContentLoaded', loadEvents);
        
    })();
    </script>
</body>
</html>
